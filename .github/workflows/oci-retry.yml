name: OCI A1 Auto Retry

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  retry:
    runs-on: ubuntu-latest
    timeout-minutes: 4

    steps:
      - uses: actions/checkout@v4

      - name: Install OCI CLI
        run: |
          pip install oci-cli --quiet
          oci --version

      - name: Configure OCI CLI
        run: |
          mkdir -p ~/.oci
          printf '[DEFAULT]\nuser=${{ secrets.OCI_USER_ID }}\nfingerprint=${{ secrets.OCI_FINGERPRINT }}\nkey_file=~/.oci/oci_api_key.pem\ntenancy=${{ secrets.OCI_TENANCY_ID }}\nregion=ap-osaka-1\n' > ~/.oci/config
          printf '%s\n' '${{ secrets.OCI_API_KEY }}' > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem ~/.oci/config

      - name: Run retry script
        env:
          OCI_SSH_PUB_KEY: ${{ secrets.OCI_SSH_PUB_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          chmod +x retry.sh
          bash retry.sh
