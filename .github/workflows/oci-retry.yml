name: OCI A1 Auto Retry

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  retry:
    runs-on: ubuntu-latest
    timeout-minutes: 4

    steps:
      - uses: actions/checkout@v4

      - name: Install OCI CLI
        run: |
          pip install oci-cli --quiet
          oci --version

      - name: Configure OCI CLI
        env:
          OCI_USER_ID: ${{ secrets.OCI_USER_ID }}
          OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_TENANCY_ID: ${{ secrets.OCI_TENANCY_ID }}
          OCI_API_KEY: ${{ secrets.OCI_API_KEY }}
        run: |
          mkdir -p ~/.oci
          cat > ~/.oci/config <<EOF
          [DEFAULT]
          user=${OCI_USER_ID}
          fingerprint=${OCI_FINGERPRINT}
          key_file=~/.oci/oci_api_key.pem
          tenancy=${OCI_TENANCY_ID}
          region=ap-osaka-1
          EOF
          sed -i 's/^[[:space:]]*//' ~/.oci/config
          echo "${OCI_API_KEY}" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem ~/.oci/config
          cat ~/.oci/config

      - name: Run retry script
        env:
          OCI_SSH_PUB_KEY: ${{ secrets.OCI_SSH_PUB_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          chmod +x retry.sh
          bash retry.sh
