name: OCI A1 Auto Retry

on:
  workflow_dispatch:

jobs:
  retry:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Install OCI CLI
        run: |
          pip install oci-cli --quiet
          oci --version

      - name: Configure OCI CLI
        env:
          OCI_USER_ID: ${{ secrets.OCI_USER_ID }}
          OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_TENANCY_ID: ${{ secrets.OCI_TENANCY_ID }}
          OCI_API_KEY: ${{ secrets.OCI_API_KEY }}
        run: |
          mkdir -p ~/.oci
          echo "[DEFAULT]" > ~/.oci/config
          echo "user=${OCI_USER_ID}" >> ~/.oci/config
          echo "fingerprint=${OCI_FINGERPRINT}" >> ~/.oci/config
          echo "key_file=~/.oci/oci_api_key.pem" >> ~/.oci/config
          echo "tenancy=${OCI_TENANCY_ID}" >> ~/.oci/config
          echo "region=ap-osaka-1" >> ~/.oci/config
          echo "${OCI_API_KEY}" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem ~/.oci/config

      - name: Run retry script
        env:
          OCI_SSH_PUB_KEY: ${{ secrets.OCI_SSH_PUB_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          chmod +x retry.sh
          bash retry.sh
